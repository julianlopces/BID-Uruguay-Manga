name: BID Uruguay - Pipeline Alertas

on:
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions
  schedule:
    # Corre cada 2 horas (UTC). 
    # 00:00 UTC es 21:00 Uruguay (-3h).
    - cron: "0 */2 * * *" 

concurrency:
  group: bid-manga-alertas
  cancel-in-progress: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      GITHUB_ACTIONS: "true"
      # Estos secretos deben estar configurados en Settings > Secrets del Repo
      SCTO_SERVER: ${{ secrets.SCTO_SERVER }}
      SCTO_USER: ${{ secrets.SCTO_USER }}
      SCTO_PW: ${{ secrets.SCTO_PW }}
      GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        # Necesario para paquetes espaciales (sf) y otros
        run: |
          sudo apt-get update
          sudo apt-get install -y libudunits2-dev libgdal-dev libgeos-dev libproj-dev libharfbuzz-dev libfribidi-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            github::julianlopces/odkmissing
            any::pacman
            any::tidyverse
            any::httr
            any::jsonlite
            any::googledrive
            any::googlesheets4
            any::writexl
            any::readxl
            any::haven
            any::labelled
            any::gtsummary
            any::stringi
            any::stringdist
            any::fuzzyjoin
            any::janitor
            any::dotenv
            any::sf

      - name: Run Master Script
        # Como el script está en la raíz del repo:
        run: Rscript BID_Uruguay_master_script.R